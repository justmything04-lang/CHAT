services:
  - type: web
    name: ai-study-partner
    env: python
    plan: free
    rootDir: ai_study_partner
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SHEET_SHARE_EMAIL
        sync: false
      - key: RENDER_APP_URL
        sync: false
      - key: STORAGE_BACKEND
        value: sqlite
      - key: TIMEZONE
        value: Asia/Kolkata
      - key: KEEP_ALIVE_SECONDS
        value: "600"
